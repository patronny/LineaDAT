[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
cache_path = "cache"

solc_version = "0.8.30"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = true
bytecode_hash = "ipfs"
cbor_metadata = true

auto_detect_remappings = false

fuzz = { runs = 256, max_test_rejects = 65536 }
invariant = { runs = 32, depth = 64, fail_on_revert = false }

verbosity = 3

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = false
int_types = "long"
quote_style = "double"

[rpc_endpoints]
linea = "https://rpc.linea.build"
ethereum = "https://ethereum-rpc.publicnode.com"

[etherscan]
linea = { key = "${LINEASCAN_API_KEY}", chain = 59144, url = "https://api.lineascan.build/api" }
